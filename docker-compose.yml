version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pothulaaditya
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: devcollab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_HOSTNAME: db          # ← "db" not "localhost" (container name!)
      DATABASE_USERNAME: pothulaaditya
      DATABASE_PASSWORD: 1234
      DATABASE_PORT: 5432
      DATABASE_NAME: devcollab
      REDIS_HOST: redis              # ← "redis" not "localhost"
    env_file:
      - .env

  worker:
    build: .
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      DATABASE_HOSTNAME: db
      DATABASE_USERNAME: pothulaaditya
      DATABASE_PASSWORD: 1234
      DATABASE_PORT: 5432
      DATABASE_NAME: devcollab
      REDIS_HOST: redis
    env_file:
      - .env

volumes:
  postgres_data: